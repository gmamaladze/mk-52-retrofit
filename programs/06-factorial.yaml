id: factorial
title: Факториал
description: Вычисление n! итеративно (n ≥ 1).
author: Claude
instructions: |
  Вычисляет n! = 1·2·…·n итеративным умножением.

  Использование:
    1. Введите целое n (≥ 1).
    2. В/О, затем С/П.
    3. На экране — n!.

  Регистры:
    Р1 — текущий аккумулятор n!
    Р2 — счётчик от n до 1
code: |
  П2  1   П1  ИП1 ИП2
  *   П1  ИП2 1   -
  П2  x#0 03  ИП1 С/П
