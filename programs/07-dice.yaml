id: dice
title: Игральная кость
description: Случайное число от 1 до 6 по нажатию С/П (генератор СЧ).
author: Claude
instructions: |
  Эмулирует бросок шестигранной кости через встроенный генератор
  псевдослучайных чисел СЧ.

  Использование:
    1. В/О, затем С/П — на экране случайное число от 1 до 6.
    2. Каждое С/П — новый бросок.

  Формула: [6·СЧ] + 1, где СЧ ∈ [0, 1).
code: |
  СЧ  6   *   [x] 1
  +   С/П БП  00
