id: gcd
title: Наибольший общий делитель
description: НОД двух натуральных чисел по алгоритму Евклида с делением.
author: Claude
instructions: |
  Алгоритм Евклида: пока b ≠ 0, повторяем (a, b) ← (b, a mod b).
  a mod b вычисляется как a − b·[a/b].

  Использование:
    1. Введите a, нажмите В↑, введите b.
    2. В/О, затем С/П.
    3. На экране — НОД(a, b).

  Регистры:
    Р1 — текущее b
    Р2 — текущее a
code: |
  П1  ↔   П2  ИП1 x=0
  21  ИП2 ИП1 /   [x]
  ИП1 *   ИП2 ↔   -
  ИП1 П2  ↔   П1  БП
  03  ИП2 С/П
