id: squares
title: Квадраты натуральных чисел
description: "На каждое нажатие С/П выводит следующий квадрат: 1, 4, 9, 16, 25, …"
author: Claude
instructions: |
  Демонстрация цикла со счётчиком. Каждое нажатие С/П увеличивает
  счётчик на единицу и показывает его квадрат.

  Использование:
    1. В/О, затем С/П — на экране 1 (= 1²).
    2. Каждое С/П — следующий квадрат: 4, 9, 16, …

  Регистры:
    Р1 — текущее n
code: |
  0   П1  ИП1 1   +
  П1  ИП1 x^2 С/П БП  02
