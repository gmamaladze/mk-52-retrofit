id: counter
title: Счётчик
description: Каждое нажатие С/П увеличивает значение на единицу.
author: Claude
instructions: |
  Простейший счётчик: после В/О и С/П на экране 0. Каждое следующее
  нажатие С/П прибавляет единицу.

  Использование:
    1. В/О, затем С/П — на экране 0.
    2. С/П — на экране 1, 2, 3, …

  Регистры:
    Р1 — текущее значение счётчика
code: |
  0   П1  ИП1 С/П ИП1
  1   +   П1  БП  02
