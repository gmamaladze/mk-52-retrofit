id: moon-landing
title: Прилунение
description: Лунная посадка — пошаговая симуляция спуска с гашением скорости.
author: George Mamaladze
instructions: |
  Перед запуском занесите в регистры начальные условия:
    П1 — высота
    П2 — скорость
    П3 — масса корабля
    П4 — расход топлива при максимальной тяге
    П5 — удельная тяга
    П6 — лунное ускорение
    П8 — длительность шага (с)

  Запуск: В/О, затем С/П. На каждом шаге программа останавливается;
  введите долю максимальной тяги (0…1) и снова С/П. Программа продолжит
  расчёт высоты и скорости.

  Завершение:
    777 — мягкая посадка
    666 — корабль разбился
code: |
  ИП1 С/П ИП3 С/П ИП2 С/П ИП4 1   0    *
  ИП5 /   ИП6 -   П7  ИП8 *   ИП3 +    П9
  x^2 ^   ИП3 x^2 -   ИП7 /   2   /    ИП1
  +   П1  ИП9 П3  ИП2 ИП4 ИП8 -   П2   |x|
  2   -   x<0 00  ИП3 |x| 5   -   x>=0 54
  6   6   6   С/П 7   7   7   С/П
