id: power
title: Возведение в целую степень
description: Вычисляет x^n итеративным умножением для целого n ≥ 0.
author: Claude
instructions: |
  Вычисление x^n циклом умножений (без логарифмов). При n = 0
  результат равен 1.

  Использование:
    1. Введите x, нажмите В↑, введите n (целое, ≥ 0).
    2. В/О, затем С/П.
    3. На экране — x^n.

  Регистры:
    Р1 — оставшееся число умножений
    Р2 — основание x
    Р3 — текущий аккумулятор
code: |
  П1  ↔   П2  1   П3
  ИП1 x=0 18  ИП2 ИП3
  *   П3  ИП1 1   -
  П1  БП  05  ИП3 С/П
