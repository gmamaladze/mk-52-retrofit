id: sum-n
title: Сумма 1…n
description: Сумма натуральных чисел от 1 до n итеративно.
author: Claude
instructions: |
  Вычисляет S = 1 + 2 + … + n циклом сложений. Для n = 0 на экране 0.

  Использование:
    1. Введите целое n (≥ 0).
    2. В/О, затем С/П.
    3. На экране — сумма.

  Регистры:
    Р1 — оставшийся счётчик
    Р2 — накопленная сумма
code: |
  П1  0   П2  ИП1 x=0
  15  ИП2 +   П2  ИП1
  1   -   П1  БП  03
  ИП2 С/П
