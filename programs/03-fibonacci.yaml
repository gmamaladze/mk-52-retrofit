id: fibonacci
title: Числа Фибоначчи
description: Генерация чисел Фибоначчи итеративно.
author: Claude
instructions: |
  Программа выводит подряд члены ряда Фибоначчи: 1, 2, 3, 5, 8, 13, …

  Использование:
    1. В/О, затем С/П — на экране 1.
    2. Каждое последующее С/П показывает следующее число ряда.

  Регистры:
    П1 — F(n-1)
    П2 — F(n)
    П3 — F(n+1) = F(n-1) + F(n)
code: |
  0 П1 1 П2
  ИП1 ИП2 + П3
  ИП2 П1 ИП3 П2
  ИП3 С/П
  БП 04
