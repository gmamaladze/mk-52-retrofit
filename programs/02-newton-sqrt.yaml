id: newton-sqrt
title: Корень по Ньютону
description: Извлечение квадратного корня методом итераций Ньютона.
author: Claude
instructions: |
  Демонстрация итеративного метода: каждая итерация даёт всё более точное
  приближение к √x. Останавливается на каждом шаге, чтобы было видно
  сходимость.

  Использование:
    1. Введите число (например 25), нажмите В/О, затем С/П.
    2. На экране — первое приближение (x/2).
    3. С/П — следующая итерация: g := (g + x/g) / 2.
    4. Повторяйте С/П — значения быстро сходятся к √x.

  Регистры:
    П1 — x (входное число)
    П2 — текущая оценка корня
code: |
  П1 2 / П2
  ИП1 ИП2 / ИП2 + 2 / П2 С/П
  БП 03
