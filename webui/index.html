<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>George's MK 52</title>
    <style>
        /* A minimal 7-segment font (≈4 KB) by Torinak, SIL OFL. Unlike DSEG7
           it includes the corner-bracket glyphs ⌜⌝⌞⌟ (U+231C..F) — ⌜ is
           a perfect Γ-shape (top horizontal + left vertical), which the
           МК-52 uses for the Cyrillic Г in error messages like "ЕГГОГ". */
        @font-face {
            font-family: 'Seg7';
            src: url('https://torinak.com/font/7segment.woff') format('woff'),
                 url('https://torinak.com/font/7segment.ttf') format('truetype');
            font-display: swap;
        }

        td {
            text-align: center;
            vertical-align: bottom;
        }

        .МК-61 button {
            height: 40px;
            width: 58px;
            background: #D0D0D0;
            color: #3D4242;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            text-align: center;
            border: solid 1px #707070;
            cursor: pointer;
            line-height: 12px;
            margin-top: 0px;
            margin-bottom: 3px;
            border-radius: 5px;
            box-shadow: 0px 4px 0px #707070;
        }

        .МК-61 button:active {
            margin-top: 3px;
            margin-bottom: 0px;
            box-shadow: 0px 1px 0px #707070;
        }

        .МК-61 .верхняя_кнопка {
            background: #3A434B;
            color: #F8F8F8;
            box-shadow: 0px 4px 0px #1A232B;
        }

        .МК-61 .верхняя_кнопка:active {
            box-shadow: 0px 1px 0px #1A232B;
        }

        .МК-61 .кнопка_F {
            background: #F1DF44;
            box-shadow: 0px 4px 0px #B19F04;
        }

        .МК-61 .кнопка_F:active {
            box-shadow: 0px 1px 0px #B19F04;
        }

        .МК-61 .кнопка_K {
            background: #5BC8EC;
            color: #F8F8F8;
            box-shadow: 0px 4px 0px #389DBA;
        }

        .МК-61 .кнопка_K:active {
            box-shadow: 0px 1px 0px #389DBA;
        }

        .МК-61 .кнопка_Сx {
            background: #F03945;
            color: #F8F8F8;
            box-shadow: 0px 4px 0px #B02935;
        }

        .МК-61 .кнопка_Сx:active {
            box-shadow: 0px 1px 0px #B02935;
        }

        .МК-61 .индикатор {
            height: 50px;
            width: 360px;
            background: #203830;
            border: solid 1px #C0C0C0;
            vertical-align: middle;
            box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.65);
        }

        .МК-61 .знакоместо {
            box-sizing: border-box;
            height: 40px;
            width: 29px;
            padding: 0;
            margin: 0;
            background: transparent;
            color: #73FBDE;
            border: 0;
            outline: 0;
            font-family: 'Seg7', 'Courier New', monospace;
            font-size: 22px;
            text-align: left;
            letter-spacing: 0;
            text-shadow:
                0 0 2px currentColor,
                0 0 5px currentColor;
        }

        .МК-61 .переключатель {
            padding: 5px 10px;
            text-align: left;
        }

        .МК-61 .переключатель {
            padding: 5px 10px;
            text-align: left;
        }

        .МК-61 .бел_т {
            color: #F8F8F8;
            font-size: 14px;
            font-weight: bold;
        }

        .МК-61 .жёл_т {
            color: #C6C73F;
            font-size: 14px;
            font-weight: bold;
            font-family: sans-serif;
        }

        .МК-56 .жёл_т {
            color: #C6C73F;
            font-size: 14px;
            font-family: sans-serif;
        }

        .син_т {
            color: #4681B4;
            font-size: 14px;
            font-weight: bold;
            font-family: sans-serif;
        }

    </style>
</head>
<body>


<input type="text" id="display">


<script type="text/javascript">

    // The chip's display character set includes Cyrillic letters that the
    // original МК-52 rendered by lighting specific 7-segment patterns. The
    // Seg7 font has only Latin/punctuation glyphs, so we substitute by
    // 7-segment shape:
    //   Cyrillic Е → Latin E (same shape: segments a,d,e,f,g)
    //   Cyrillic С → Latin C (same shape: segments a,d,e,f)
    //   Cyrillic Г → ⌜       (U+231C TOP LEFT CORNER — top + left only)
    var SEG_REMAP = {"Е": "E", "С": "C", "Г": "⌜"};

    function display(digits, points, is_dimmed) {
        var color = is_dimmed ? "#43CBAE" : "#73FBDE";
        for (var pos = 0; pos < 12; pos++) {
            var cell = document.getElementById("Знакоместо_" + pos);
            cell.style.color = color;
            var ch = digits.charAt(pos);
            if (SEG_REMAP[ch]) ch = SEG_REMAP[ch];
            // Append "," from the chip's `points` string where it carries a
            // decimal-point marker. The Seg7 font renders the comma as a
            // segment-style tail beneath the digit.
            cell.value = points.charAt(pos) === "," ? ch + "," : ch;
        }
    }

    function Нажатие_кнопки(x, y) {
        fetch('/press', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({x: x, y: y})
        });
    }

    // Ported from emulator.js Нажатие_клавиши — keyboard → (x, y) mapping.
    document.onkeydown = function (event) {
        var e = event || window.event;
        var code = (e.charCode && e.keyCode == 0 ? e.charCode : e.keyCode);
        if (code >= 48 && code <= 57) return Нажатие_кнопки(code - 46, 1);
        if (code >= 96 && code <= 105) return Нажатие_кнопки(code - 94, 1);
        switch (code) {
            case 13: case 38: case 32: Нажатие_кнопки(11, 8); break; // В↑
            case 27: case 46: Нажатие_кнопки(10, 8); break;          // Сx
            case 70: Нажатие_кнопки(11, 9); break;                   // F
            case 75: Нажатие_кнопки(10, 9); break;                   // K
            case 106: Нажатие_кнопки(4, 8); break;                   // *
            case 107: Нажатие_кнопки(2, 8); break;                   // +
            case 109: Нажатие_кнопки(3, 8); break;                   // -
            case 111: Нажатие_кнопки(5, 8); break;                   // /
            case 110: Нажатие_кнопки(7, 8); break;                   // ,
            case 37: Нажатие_кнопки(7, 9); break;                    // ШГ←
            case 39: Нажатие_кнопки(9, 9); break;                    // ШГ→
            default: break;
        }
    };

    var evt = new EventSource('/events');
    evt.onmessage = function (event) {
        var msg = JSON.parse(event.data);
        display(msg.digits, msg.points, msg.is_dimmed);
    };

    var programs = [];

    function fetchPrograms() {
        return fetch('/programs').then(function (r) { return r.json(); }).then(function (list) {
            programs = list;
            var sel = document.getElementById('program_select');
            sel.innerHTML = '<option value="">— select program —</option>';
            list.forEach(function (p, i) {
                var opt = document.createElement('option');
                opt.value = String(i);
                opt.textContent = p.title || p.id;
                sel.appendChild(opt);
            });
        });
    }

    function onSelectProgram() {
        var idx = document.getElementById('program_select').value;
        var info = document.getElementById('program_instructions');
        if (idx === '') {
            info.textContent = '';
            document.getElementById('source_code').value = '';
            return;
        }
        var p = programs[parseInt(idx, 10)];
        var parts = [];
        if (p.title) parts.push(p.title);
        if (p.description) parts.push(p.description);
        if (p.instructions) parts.push((p.instructions || '').trim());
        info.textContent = parts.join('\n\n');
        document.getElementById('source_code').value = (p.code || '').trim();
    }

    function logLine(msg) {
        var log = document.getElementById('load_log');
        var ts = new Date().toTimeString().slice(0, 8);
        log.textContent += '[' + ts + '] ' + msg + '\n';
        log.scrollTop = log.scrollHeight;
    }

    function loadProgram() {
        var code = document.getElementById('source_code').value;
        if (!code.trim()) { logLine('ERROR: no code — enter some or pick a program'); return; }
        // Server enters each token as ~2 keystrokes at ~180ms each, plus ~7
        // keystrokes for mode entry/exit. Estimate so we can animate a bar.
        var tokens = code.split(/\s+/).filter(Boolean).length;
        var estimateMs = (2 * tokens + 7) * 180;

        var bar = document.getElementById('load_bar');
        var wrap = document.getElementById('load_progress');
        wrap.style.visibility = 'visible';
        bar.style.transition = 'none';
        bar.style.width = '0%';
        // Force reflow so the next transition takes effect from 0%.
        void bar.offsetWidth;
        bar.style.transition = 'width ' + estimateMs + 'ms linear';
        bar.style.width = '95%';
        logLine('loading ' + tokens + ' tokens via keystroke entry (~' + (estimateMs/1000).toFixed(1) + 's)…');

        fetch('/load', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: code}),
        }).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error(t || r.statusText); });
            return r.json();
        }).then(function (data) {
            bar.style.transition = 'width 150ms linear';
            bar.style.width = '100%';
            logLine('OK: loaded ' + data.steps + ' step(s). Press В/О then С/П to run.');
            setTimeout(function () { wrap.style.visibility = 'hidden'; }, 400);
        }).catch(function (err) {
            bar.style.transition = 'none';
            bar.style.width = '0%';
            wrap.style.visibility = 'hidden';
            logLine('ERROR: ' + err.message);
        });
    }

    // A↑ ("load from ROM"): type a program number on the keypad first, then
    // click this. The server tracks digit keypresses and uses the buffered
    // value to look up programs/NN-*.yaml.
    function loadFromRom() {
        fetch('/press', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({x: 3, y: 0}),
        }).then(function (r) {
            if (r.status === 204) return null;
            return r.json();
        }).then(function (data) {
            if (data && data.message) logLine(data.message);
        }).catch(function (err) {
            logLine('ERROR: ' + err.message);
        });
    }

    fetchPrograms();

</script>

<div id="МК-61" style="position: absolute; top: 0;">
    <table align="center" class="МК-61" style="background-color: #353535; border: outset 3px #FFFFFF; padding: 5px;">
        <tbody>
        <tr>
            <td rowspan="8">&nbsp;&nbsp;&nbsp;</td>
            <td rowspan="8" style="vertical-align: top">
                <table>
                    <tr>
                        <td colspan="2">
                            <span class="бел_т" style="font-size: 16px;">ЭЛЕКТРОНИКА&nbsp;&nbsp;&nbsp;МК&nbsp;52</span>
                            <br>
                            <br>
                            <br>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center" class="индикатор">
                            <br>
                            <script>
                                for (var сч = 0; сч < 12; сч++)
                                    document.write('<input type=text class="знакоместо" id="Знакоместо_' + сч + '" readonly />');
                            </script>
                            <br>
                            <br>
                        </td>
                    </tr>
                </table>
            </td>
            <td rowspan="8">&nbsp;&nbsp;&nbsp;</td>
            <td><br>
                <button class="кнопка_F" onclick="Нажатие_кнопки(11,9);">F</button>
            </td>

            <td><span class="жёл_т">x&lt;0</span><br>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(7,9);">→<br>ШГ</button>
            </td>
            <td><span class="жёл_т">L0</span><br>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(8,9);">П→X</button>
            </td>
            <td><span class="жёл_т">sin</span>&nbsp;<span class="син_т">[x]</span><br>
                <button onclick="Нажатие_кнопки(9,1);">7</button>
            </td>
            <td><span class="жёл_т">cos</span>&nbsp;<span class="син_т">{x}</span><br>
                <button onclick="Нажатие_кнопки(10,1);">8</button>
            </td>
            <td><span class="жёл_т">tg</span>&nbsp;<span class="син_т">max</span><br>
                <button onclick="Нажатие_кнопки(11,1);">9</button>
            </td>
            <td><span class="жёл_т">√¯</span><br>
                <button onclick="Нажатие_кнопки(3,8);">-</button>
            </td>
            <td><span class="жёл_т">1/x</span><br>
                <button onclick="Нажатие_кнопки(5,8);">÷</button>
            </td>
            <td></td>
        </tr>
        <tr>
            <td><br>
                <button class="кнопка_K" onclick="Нажатие_кнопки(10,9);">K</button>
            </td>

            <td><span class="жёл_т">x=0</span><br>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(9,9);">←<br>ШГ</button>
            </td>

            <td><span class="жёл_т">L1</span><br>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(6,9);">X→П</button>
            </td>

            <td><span class="жёл_т">sin<sup>-1</sup></span>&nbsp;<span class="син_т">|x|</span><br>
                <button onclick="Нажатие_кнопки(6,1);">4</button>
            </td>
            <td><span class="жёл_т">cos<sup>-1</sup></span>&nbsp;<span class="син_т">ЗН</span><br>
                <button onclick="Нажатие_кнопки(7,1);">5</button>
            </td>
            <td>
                <span class="жёл_т">tg<sup>-1</sup></span>&nbsp;
                <span class="син_т" style="font-size: 10px; letter-spacing:-3px;">°<span
                        style="vertical-align: 8px;">←</span>'</span><br>
                <button onclick="Нажатие_кнопки(8,1);">6</button>
            </td>
            <td>
                <span class="жёл_т">π</span>&nbsp;
                <span class="син_т" style="font-size: 10px; letter-spacing:-3px;">°<span
                        style="vertical-align: 8px;">→</span>'</span><br>
                <button onclick="Нажатие_кнопки(2,8);">+</button>
            </td>
            <td><span class="жёл_т">x²</span><br>
                <button onclick="Нажатие_кнопки(4,8);">×</button>
            </td>
            <td></td>
        </tr>
        <tr>
            <td>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(0,0);">↑↓</button>
            </td>
            <td><span class="жёл_т">x≥0</span><br>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(4,9);">В/О</button>
            </td>

            <td><span class="жёл_т">L2</span><br>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(3,9);">БП</button>
            </td>

            <td><span class="жёл_т">e<sup>x</sup></span><br>
                <button onclick="Нажатие_кнопки(3,1);">1</button>
            </td>
            <td><span class="жёл_т">lg</span><br>
                <button onclick="Нажатие_кнопки(4,1);">2</button>
            </td>
            <td>
                <span class="жёл_т">ln</span>&nbsp;
                <span class="син_т" style="font-size: 10px; letter-spacing:-3px;">
				°<span style="vertical-align: 8px;">←</span><span style="letter-spacing:-2px;">' &nbsp; "</span>
			</span><br>
                <button onclick="Нажатие_кнопки(5,1);">3</button>
            </td>
            <td>
                <span class="жёл_т">x<sup>y</sup></span>&nbsp;
                <span class="син_т" style="font-size: 10px; letter-spacing:-3px;">
				°<span style="vertical-align: 8px;">→</span><span style="letter-spacing:-2px;">' &nbsp; "</span>
			</span><br>
                <button onclick="Нажатие_кнопки(6,8);">↔</button>
            </td>
            <td><span class="жёл_т">Вx</span>&nbsp;<span class="син_т">СЧ</span><br>
                <button onclick="Нажатие_кнопки(11,8);">В↑</button>
            </td>
            <td class="надпись"><span class="бел_т"><br>e</span></td>
        </tr>
        <tr>

            <td>
                <button class="верхняя_кнопка" onclick="loadFromRom();">A↑</button>
            </td>

            <td><span class="жёл_т">x≠0</span><br>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(2,9);">С/П</button>
            </td>
            <td><span class="жёл_т">L3</span><br>
                <button class="верхняя_кнопка" onclick="Нажатие_кнопки(5,9);">ПП</button>
            </td>
            <td><span class="жёл_т">10<sup>x</sup></span>&nbsp;<span class="син_т">НОП</span><br>
                <button onclick="Нажатие_кнопки(2,1);">0</button>
            </td>
            <td><span class="жёл_т">Ѻ</span>&nbsp;<span class="син_т">∧</span><br>
                <button onclick="Нажатие_кнопки(7,8);">.</button>
            </td>
            <td><span class="жёл_т">АВТ</span>&nbsp;<span class="син_т">∨</span><br>
                <button onclick="Нажатие_кнопки(8,8);">/-/</button>
            </td>
            <td><span class="жёл_т">ПРГ</span>&nbsp;<span class="син_т">⊕</span><br>
                <button onclick="Нажатие_кнопки(9,8);">ВП</button>
            </td>
            <td><span class="жёл_т">СF</span>&nbsp;<span class="син_т">ИНВ</span><br>
                <button class="кнопка_Сx" onclick="Нажатие_кнопки(10,8);">Сx</button>
            </td>
            <td></td>
        </tr>
        <tr>
            <td colspan="4"></td>
            <td class="надпись"><span class="бел_т">a</span></td>
            <td class="надпись"><span class="бел_т">b</span></td>
            <td class="надпись"><span class="бел_т">c</span></td>
            <td class="надпись"><span class="бел_т">d</span></td>
            <td></td>
        </tr>
        </tbody>
    </table>
</div>

<style>
    .panel {
        position: absolute; top: 350px; left: 20px; width: 760px;
        font-family: sans-serif; color: #E0E0E0; background: #353535;
        border: outset 3px #FFFFFF; padding: 12px; box-sizing: border-box;
    }
    .panel .row {
        display: flex; align-items: center; gap: 8px; margin: 6px 0;
    }
    .panel .row label { font-weight: bold; }
    .panel input[type="text"],
    .panel select,
    .panel textarea {
        width: 100%; box-sizing: border-box;
        background: #202020; color: #73FBDE;
        border: 1px solid #555; padding: 6px;
        font-family: Consolas,Monaco,'Courier New',monospace;
        font-size: 13px;
    }
    .panel select { color: #E0E0E0; }
    .panel button {
        padding: 6px 14px; font-weight: bold; cursor: pointer;
        background: #5BC8EC; color: #F8F8F8; border: 1px solid #389DBA;
        border-radius: 3px;
    }
    .panel #program_instructions,
    .panel #load_log {
        white-space: pre-wrap; background: #202020; color: #D0D0D0;
        padding: 8px; border: 1px solid #555; margin: 4px 0;
        font-family: Consolas,Monaco,'Courier New',monospace; font-size: 12px;
        box-sizing: border-box; width: 100%;
    }
    .panel #program_instructions { max-height: 200px; overflow: auto; }
    .panel #load_log { height: 100px; overflow: auto; color: #C6C73F; }
    .panel #load_progress {
        height: 4px; background: #202020; border: 1px solid #555;
        margin: 4px 0; visibility: hidden; overflow: hidden;
    }
    .panel #load_bar {
        height: 100%; width: 0%; background: #73FBDE;
        box-shadow: 0 0 6px #73FBDE;
    }
</style>

<div class="panel">
    <div class="row">
        <label for="program_select">Program:</label>
        <select id="program_select" onchange="onSelectProgram()">
            <option value="">— loading list —</option>
        </select>
        <button onclick="loadProgram()">Load to MK-52</button>
    </div>
    <pre id="program_instructions"></pre>
    <textarea id="source_code" rows="8"
              placeholder="Source code (e.g.: 1 П1 ИП1 + С/П)"></textarea>
    <div id="load_progress"><div id="load_bar"></div></div>
    <pre id="load_log"></pre>
</div>


</body>
</html>
